<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anti-Echo Chamber</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 200px;
      background: #0B0F1A;
      color: #e5e7eb;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1));
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo { font-size: 20px; }
    .header-title { font-weight: 700; font-size: 14px; color: #fff; }
    .header-sub { font-size: 10px; color: #6b7280; margin-top: 1px; }

    .section { padding: 14px 16px; }

    label { display: block; font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

    .input-row { display: flex; gap: 8px; }

    input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(59,130,246,0.5); }
    input::placeholder { color: #4b5563; }

    .btn {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.35);
      border-radius: 8px;
      color: #3b82f6;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(59,130,246,0.25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-analyze {
      width: 100%;
      padding: 10px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 10px;
      color: #60a5fa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-analyze:hover { background: rgba(59,130,246,0.2); }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0 16px; }

    .result-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      border: 1px solid;
      margin-bottom: 10px;
    }

    .metric-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .metric-name { font-size: 10px; color: #9ca3af; width: 120px; flex-shrink: 0; }
    .bar-track {
      flex: 1; height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px; overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s ease; }
    .metric-pct { font-size: 10px; font-weight: 700; font-family: monospace; width: 28px; text-align: right; }

    .pol-chip {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 8px;
      padding: 5px;
      margin-top: 4px;
    }

    .status { font-size: 11px; color: #6b7280; text-align: center; padding: 8px 0; }
    .status.error { color: #ef4444; }

    .dashboard-link {
      display: block;
      text-align: center;
      font-size: 11px;
      color: #3b82f6;
      text-decoration: none;
      padding: 8px;
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 8px;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .dashboard-link:hover { background: rgba(59,130,246,0.1); }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-logo">👁</span>
    <div>
      <div class="header-title">Anti-Echo Chamber</div>
      <div class="header-sub">Real-time bias detection</div>
    </div>
  </div>

  <div class="section">
    <label>Your Username</label>
    <div class="input-row">
      <input type="text" id="usernameInput" placeholder="e.g. alice" />
      <button class="btn" id="saveBtn">Save</button>
    </div>

    <button class="btn-analyze" id="analyzeBtn" style="margin-top:12px" disabled>
      Analyze This Page
    </button>

    <div id="status" class="status"></div>

    <div class="result-card" id="resultCard">
      <div class="result-badge" id="biasBadge"></div>

      <div class="metric-row">
        <span class="metric-name">Cognitive Bias</span>
        <div class="bar-track"><div class="bar-fill" id="biasBar"></div></div>
        <span class="metric-pct" id="biasPct"></span>
      </div>
      <div class="metric-row">
        <span class="metric-name">Emotional Manip.</span>
        <div class="bar-track"><div class="bar-fill" id="emoBar"></div></div>
        <span class="metric-pct" id="emoPct"></span>
      </div>

      <div class="pol-chip" id="polChip"></div>
      <a class="dashboard-link" href="http://localhost:5173" target="_blank">Open Full Dashboard →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
